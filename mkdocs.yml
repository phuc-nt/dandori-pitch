site_name: Dandori
site_description: The unified control plane for AI coding agents in the enterprise.
site_url: https://phuc-nt.github.io/dandori-pitch/

theme:
  name: material
  custom_dir: overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  font:
    text: Inter
    code: JetBrains Mono

nav:
  - Home: index.md
  - Why Dandori: why-dandori.md
  - Core Features: core-features.md
  - Use Cases: use-cases.md
  - Architecture: architecture.md
  - Enterprise: enterprise.md
  - Presentation Guide: pitch-deck.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

hooks:
  - hooks/docs_bundle.py

extra_javascript:
  - javascripts/download-docs.js
  - javascripts/copy-page-markdown.js

extra:
  generator: false

copyright: Copyright © 2026 Dandori
