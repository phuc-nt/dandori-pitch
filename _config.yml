title: Dandori
description: The management layer for AI coding agents in the enterprise.

remote_theme: just-the-docs/just-the-docs
plugins:
  - jekyll-remote-theme

baseurl: "/dandori-pitch"
url: "https://phuc-nt.github.io"

logo: "/assets/logos/logo-dandori.svg"

color_scheme: brand

search_enabled: true
search:
  heading_level: 2
  previews: 3

nav_sort: order

aux_links:
  "GitHub":
    - "https://github.com/phuc-nt/dandori"

aux_links_new_tab: true

footer_content: "Copyright &copy; 2026 Dandori &middot; <a href=\"https://github.com/phuc-nt/dandori\">GitHub</a>"

back_to_top: true
back_to_top_text: "Back to top"
heading_anchors: true

# Table of contents (right sidebar)
toc:
  heading_level: 2
  toc_level: 2

# Mermaid diagram support
mermaid:
  version: "10.9.0"

exclude:
  - docs/
  - overrides/
  - hooks/
  - mkdocs.yml
  - site/
  - node_modules/
