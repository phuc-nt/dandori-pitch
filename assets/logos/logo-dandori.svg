<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 360" role="img" aria-label="Dandori logo">
  <title>Dandori</title>

  <!-- Faceted triangle: 3-row subdivision, 9 facets -->
  <!-- Matches dandori-pitch PNG: gray peak, red band, dark base -->

  <!-- Row 0: top peak -->
  <polygon points="200,20 145,127 255,127" fill="#c0c0c0"/>

  <!-- Row 1: red accent band -->
  <polygon points="145,127 90,233 200,233" fill="#b0b0b0"/>
  <polygon points="145,127 255,127 200,233" fill="#cc3333"/>
  <polygon points="255,127 200,233 310,233" fill="#c5c5c5"/>

  <!-- Row 2: dark center, light edges -->
  <polygon points="90,233 35,340 145,340" fill="#c0c0c0"/>
  <polygon points="90,233 200,233 145,340" fill="#807070"/>
  <polygon points="200,233 145,340 255,340" fill="#4d4d4d"/>
  <polygon points="200,233 310,233 255,340" fill="#909090"/>
  <polygon points="310,233 255,340 365,340" fill="#b8b8b8"/>
</svg>
