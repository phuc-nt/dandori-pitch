<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body, html {
      margin: 0; padding: 0;
      width: 1280px; height: 640px;
      background: #0d0d0d;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }
    .wrap {
      width: 1280px; height: 640px;
      background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #0d0d0d 100%);
      display: flex; align-items: center; justify-content: center; gap: 60px;
      position: relative;
    }
    .grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    img { width: 280px; height: 280px; filter: drop-shadow(0 20px 30px rgba(0,0,0,0.5)); position: relative; z-index: 1; }
    .txt { position: relative; z-index: 1; }
    .badge {
      display: inline-block;
      background: rgba(92,107,192,0.15);
      color: #7986cb;
      border: 1px solid rgba(92,107,192,0.3);
      padding: 8px 18px; border-radius: 100px;
      font-size: 15px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase;
      margin-bottom: 20px;
    }
    h1 { font-size: 78px; font-weight: 800; color: #fff; margin: 0; letter-spacing: -2px; line-height: 1.05; }
    p { font-size: 28px; color: #888; margin: 18px 0 0; max-width: 560px; line-height: 1.45; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="grid"></div>
    <img src="logos/logo-dandori.svg" alt="Dandori logo">
    <div class="txt">
      <div class="badge">AI Agent Governance</div>
      <h1>Dandori</h1>
      <p>The management layer for AI coding agents in the enterprise.</p>
    </div>
  </div>
</body>
</html>
